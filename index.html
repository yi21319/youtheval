<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生综合素养评测系统 - 完整版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 三个系统容器 */
        #studentSystem,
        #monitorSystem,
        #adminSystem {
            display: none;
        }

        /* Toast动画 */
        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .custom-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <!-- 第一部分：登录注册页面 -->
    <div id="authSystem" class="auth-body">
        <div class="background"></div>
        <div class="auth-container" id="authContainer">
            <!-- 登录面板 (右边) -->
            <div class="panel login-panel">
                <h2>欢迎回来！</h2>
                <p>请登录您的账号</p>

                <div class="input-group"><input type="text" id="loginUsername" placeholder="学号/工号" /></div>
                <div class="input-group"><input type="password" id="loginPassword" placeholder="密码" /></div>
                <div
                    style="width: 100%; display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 15px; color: #8d6e63;">
                    <label><input type="checkbox" style="width: auto; margin-right: 5px;" /> 记住密码</label>
                    <a href="#" id="forgotPwdLink" style="color: #8d6e63;">忘记密码？</a>
                </div>
                <button class="submit-btn" onclick="handleLogin()">登 录</button>
                <div class="switch-text">
                    没有账号？<a href="#" id="register-link">点击注册</a>
                </div>
                <div class="test-acc">
                    测试账号:<br>
                    学生: 2024001 / 123456<br>
                    班委: 2024002 / 123456<br>
                    管理员: 2401 / 123456
                </div>
            </div>

            <!-- 注册面板 (左边) -->
            <div class="panel register-panel">
                <h2>开启旅程！</h2>
                <p>请填写您的信息</p>
                <div class="input-group"><input type="text" id="regName" placeholder="姓名" /></div>
                <div class="input-group"><input type="text" id="regId" placeholder="学号" /></div>
                <div class="input-group"><input type="text" id="regClass" placeholder="班级" /></div>
                <div class="input-group"><input type="text" id="regPhone" placeholder="手机号" /></div>
                <div class="input-group code-row">
                    <input type="text" id="regCode" placeholder="验证码" />
                    <button class="code-btn" onclick="sendSmsCode()">获取验证码</button>
                </div>
                <div class="input-group"><input type="password" id="regPassword" placeholder="密码" /></div>
                <div class="input-group"><input type="password" id="regConfirm" placeholder="确认密码" /></div>
                <button class="submit-btn" onclick="handleRegister()">注 册</button>
                <div class="switch-text">
                    已有账号？<a href="#" id="login-link">点击登录</a>
                </div>
            </div>

            <!-- 忘记密码面板 -->
            <div class="forgot-panel" id="forgotPanel">
                <h2>找回密码</h2>
                <p>请输入您的手机号，验证后重置密码</p>
                <div class="input-group"><input type="text" id="forgotPhone" placeholder="手机号" /></div>
                <div class="input-group code-row">
                    <input type="text" id="forgotCode" placeholder="验证码" />
                    <button class="code-btn" onclick="sendForgotSmsCode()">获取验证码</button>
                </div>
                <div class="input-group"><input type="password" id="forgotNewPwd" placeholder="新密码" /></div>
                <div class="input-group"><input type="password" id="forgotConfirmPwd" placeholder="确认新密码" /></div>
                <button class="submit-btn" onclick="resetPassword()">重置密码</button>
                <div class="back-link" id="backToLogin">← 返回登录</div>
            </div>

            <!-- 大机器人 -->
            <div class="robot-container" id="robot">
                <div class="robot-img"></div>
            </div>
        </div>
    </div>

    <!-- 第二部分：学生系统 -->
    <div id="studentSystem" class="student-body"></div>

    <!-- 第三部分：班委系统 -->
    <div id="monitorSystem" class="student-body"></div>

    <!-- 第四部分：管理员系统 -->
    <div id="adminSystem" class="student-body"></div>

    <!-- 脚本引用 -->
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>

    <!-- 学生系统 -->
    <script src="js/student/student-main.js"></script>
    <script src="js/student/student-home.js"></script>
    <script src="js/student/student-notification.js"></script>
    <script src="js/student/student-standard.js"></script>
    <script src="js/student/student-apply.js"></script>
    <script src="js/student/student-account.js"></script>

    <!-- 班委系统 -->
    <script src="js/monitor/monitor-main.js"></script>
    <script src="js/monitor/monitor-home.js"></script>
    <script src="js/monitor/monitor-notification.js"></script>
    <script src="js/monitor/monitor-standard.js"></script>
    <script src="js/monitor/monitor-apply.js"></script>
    <script src="js/monitor/monitor-account.js"></script>
    <script src="js/monitor/monitor-review.js"></script>

    <!-- 管理员系统 -->
    <script src="js/admin/admin-main.js"></script>
    <script src="js/admin/admin-home.js"></script>
    <script src="js/admin/admin-notification.js"></script>
    <script src="js/admin/admin-standard.js"></script>
    <script src="js/admin/admin-account.js"></script>
    <script src="js/admin/admin-student.js"></script>
    <script src="js/admin/admin-monitor.js"></script>
    <script src="js/admin/admin-review.js"></script>

    <script>
        // 机器人鼠标跟随效果
        const robotContainer = document.getElementById('robot');
        const robotImg = robotContainer?.querySelector('.robot-img');
        if (robotContainer && robotImg) {
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                const moveX = (x - 0.5) * 40;
                const moveY = (y - 0.5) * 40;
                const rotate = (x - 0.5) * 15;
                robotContainer.classList.remove('resetting');
                robotImg.style.transform = `translate(${moveX}px, ${moveY}px) rotate(${rotate}deg)`;
            });
            document.addEventListener('mouseleave', () => robotContainer.classList.add('resetting'));
            document.addEventListener('mouseenter', () => robotContainer.classList.remove('resetting'));
        }

        // 注册/登录切换
        const registerLink = document.getElementById('register-link');
        const loginLink = document.getElementById('login-link');
        const forgotPwdLink = document.getElementById('forgotPwdLink');
        const forgotPanel = document.getElementById('forgotPanel');
        const backToLogin = document.getElementById('backToLogin');
        const authContainer = document.getElementById('authContainer');

        if (registerLink) registerLink.addEventListener('click', (e) => { e.preventDefault(); authContainer.classList.add('right-panel-active'); });
        if (loginLink) loginLink.addEventListener('click', (e) => { e.preventDefault(); authContainer.classList.remove('right-panel-active'); });
        if (forgotPwdLink) forgotPwdLink.addEventListener('click', (e) => { e.preventDefault(); forgotPanel.classList.add('active'); });
        if (backToLogin) backToLogin.addEventListener('click', () => forgotPanel.classList.remove('active'));

        // 初始化本地存储
        if (typeof initLocalStorage === 'function') initLocalStorage();
    </script>
</body>

</html>
